<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Interview Question Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<body>

    <div class="container">

        <h1>AI Interview Question Generator</h1>

        <p>
            Generate personalized interview questions using Artificial Intelligence.
        </p>

        <hr>

        <label for="resume">Upload Resume (PDF)</label>
        <br><br>

        <input type="file" id="resume" accept=".pdf">

        <br><br>

        <label for="role">Select Job Role</label>
        <br><br>

        <select id="role">

            <option>Software Engineer</option>
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>Full Stack Developer</option>
            <option>Data Analyst</option>

        </select>

        <br><br>

        <label>Difficulty</label>

        <br><br>

        <input type="radio" name="difficulty"> Easy
        <input type="radio" name="difficulty"> Medium
        <input type="radio" name="difficulty"> Hard

        <br><br>

        <button>Generate Questions</button>

    </div>

    <script src="script.js"></script>

</body>

</body>

</html>
